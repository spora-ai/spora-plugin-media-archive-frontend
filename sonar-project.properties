# SonarQube / SonarCloud project configuration for spora-plugin-media-archive-frontend.
#
# Coverage is produced by Vitest (v8 provider) and lands at ./coverage/lcov.info.
# The CI workflow uses the official SonarSource GitHub Action which picks up
# SONAR_TOKEN from repo secrets and reads sonar-project.properties.

# --- SonarCloud identity -----------------------------------------------------
# `sonar.organization` is the SonarCloud organization key. For SonarQube Server
# (self-hosted) this line can be deleted and `sonar.host.url` set instead.
sonar.organization=spora-ai

# projectKey follows the `<organizationKey>_<repositorySlug>` convention that
# SonarCloud uses to map a GH repo to a SonarCloud project. Override locally
# with -Dsonar.projectKey=... if you fork the repo.
sonar.projectKey=spora-ai_spora-plugin-media-archive-frontend
sonar.projectName=spora-plugin-media-archive-frontend
sonar.projectVersion=0.1.0

# --- Source / test layout ----------------------------------------------------
sonar.sources=src
sonar.tests=tests

# Exclusions — keep generated / vendor / build artefacts out of the analysis.
sonar.exclusions=\
  frontend/**,\
  node_modules/**,\
  coverage/**,\
  **/*.d.ts,\
  **/*.spec.ts,\
  scripts/**

sonar.test.exclusions=\
  frontend/**,\
  node_modules/**,\
  coverage/**,\
  **/*.spec.ts

# --- File suffixes the JS/TS analyzer should pick up -------------------------
# IMPORTANT: `.ts` must NOT appear in sonar.javascript.file.suffixes — if it
# does, every .ts file matches both this pattern and sonar.typescript.file.
# suffixes, and the scanner aborts with
#   "Language of file '…' can not be decided as the file matches patterns
#    of both sonar.lang.patterns.js and sonar.lang.patterns.ts".
# Let the TS analyzer own .ts/.tsx; the JS analyzer handles .js and .vue.
sonar.javascript.file.suffixes=.js,.jsx,.vue
sonar.typescript.file.suffixes=.ts,.tsx
sonar.sourceEncoding=UTF-8

# --- Coverage ----------------------------------------------------------------
# The Vitest v8 provider emits an LCOV report here. The SonarSource action
# runs after `npm run test:coverage` so coverage/lcov.info exists at scan time.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Duplication detection — Vue SFCs are excluded (templates + <style> blocks
# distort the token-based copy/paste detector).
sonar.cpd.exclusions=\
  **/*.vue

# --- Quality gate ------------------------------------------------------------
# Block the PR until the gate is evaluated. If the gate fails the job exits
# non-zero and the PR can't merge until the issues are addressed.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300